<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">DCA planned airspace closure hero graphic</title>
  <desc id="desc">Original schematic showing Reagan National Airport, the Potomac River, Washington landmarks, and network links to Dulles and Baltimore Washington airports.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset=".55" stop-color="#172033"/>
      <stop offset="1" stop-color="#2b241d"/>
    </linearGradient>
    <linearGradient id="river" x1="0" x2="1">
      <stop offset="0" stop-color="#284b63" stop-opacity=".35"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity=".18"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <path d="M-40 685 C170 585 280 615 420 520 C565 420 625 345 760 360 C900 375 945 475 1110 455 C1285 433 1395 345 1650 410 L1650 920 L-40 920 Z" fill="url(#river)"/>
