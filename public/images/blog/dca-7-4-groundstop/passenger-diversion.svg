<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1150 640" role="img" aria-labelledby="title desc">
  <title id="title">Passenger diversion pathways from DCA</title>
  <desc id="desc">Conceptual flow diagram showing passengers affected by DCA flight constraints shifting toward IAD, BWI, Amtrak rail, and road travel.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#b45309"/>
    </marker>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="1" stop-color="#f8fbff"/>
    </linearGradient>
  </defs>
  <rect width="1150" height="640" rx="28" fill="url(#panel)"/>
  <text x="64" y="72" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="850">Passenger Diversion and Regional Spillover</text>
  <text x="64" y="106" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="17">Conceptual pathways when DCA flight supply is reduced during a planned closure window.</text>
  <g fill="none" stroke="#b45309" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)" opacity=".7">
    <path d="M575 285 C420 220 330 206 210 205"/>
    <path d="M575 285 C735 220 820 206 944 205"/>
    <path d="M575 355 C420 425 330 438 210 438"/>
    <path d="M575 355 C735 425 820 438 944 438"/>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(428 238)">
      <rect width="294" height="164" rx="30" fill="#172033"/>
      <circle cx="147" cy="55" r="29" fill="#f59e0b"/>
      <text x="147" y="64" text-anchor="middle" fill="#172033" font-size="24" font-weight="900">DCA</text>
      <text x="147" y="106" text-anchor="middle" fill="#fff" font-size="25" font-weight="850">Affected passengers</text>
      <text x="147" y="134" text-anchor="middle" fill="#cbd5e1" font-size="14">rebooking / mode choice / timing shifts</text>
    </g>
    <g transform="translate(70 154)">
      <rect width="214" height="104" rx="22" fill="#fff" stroke="#d9e5f5"/>
      <text x="107" y="45" text-anchor="middle" fill="#2563eb" font-size="25" font-weight="850">IAD</text>
      <text x="107" y="74" text-anchor="middle" fill="#64748b" font-size="15">Dulles flights</text>
    </g>
    <g transform="translate(866 154)">
      <rect width="214" height="104" rx="22" fill="#fff" stroke="#d9e5f5"/>
      <text x="107" y="45" text-anchor="middle" fill="#2563eb" font-size="25" font-weight="850">BWI</text>
      <text x="107" y="74" text-anchor="middle" fill="#64748b" font-size="15">Baltimore/Washington</text>
    </g>
    <g transform="translate(70 386)">
      <rect width="214" height="104" rx="22" fill="#fff" stroke="#eadfce"/>
      <text x="107" y="45" text-anchor="middle" fill="#b45309" font-size="23" font-weight="850">Amtrak / Rail</text>
      <text x="107" y="74" text-anchor="middle" fill="#64748b" font-size="15">Northeast Corridor</text>
    </g>
    <g transform="translate(866 386)">
      <rect width="214" height="104" rx="22" fill="#fff" stroke="#eadfce"/>
      <text x="107" y="45" text-anchor="middle" fill="#b45309" font-size="23" font-weight="850">Road Travel</text>
      <text x="107" y="74" text-anchor="middle" fill="#64748b" font-size="15">car / rideshare / bus</text>
    </g>
  </g>
  <text x="64" y="582" fill="#6b7280" font-family="Inter, Arial, sans-serif" font-size="14">Conceptual diagram. Arrows show plausible substitution pathways, not measured passenger volumes.</text>
</svg>
