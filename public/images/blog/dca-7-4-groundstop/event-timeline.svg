<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">America 250 DCA event timeline</title>
  <desc id="desc">Timeline from June 24-25 through August 22-23 with July 3 and July 4 emphasized as major DCA flight constraint windows.</desc>
  <rect width="1200" height="520" rx="28" fill="#fffdf8"/>
  <path d="M90 275 H1110" stroke="#e7ded2" stroke-width="8" stroke-linecap="round"/>
  <g font-family="Inter, Arial, sans-serif">
    <text x="70" y="72" fill="#172033" font-size="32" font-weight="850">America 250 Timeline: DCA Flight Constraint Windows</text>
    <text x="70" y="106" fill="#64748b" font-size="17">Public advisories identify several summer event dates, with July 3-4 carrying the strongest flight-operations signal.</text>
  </g>
  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <g transform="translate(115 275)">
      <circle r="15" fill="#d99a2b"/>
      <rect x="-62" y="44" width="124" height="78" rx="16" fill="#fff" stroke="#eadfce"/>
      <text y="76" fill="#7c2d12" font-size="15" font-weight="850">June 24-25</text>
      <text y="100" fill="#64748b" font-size="13">State Fair opening</text>
    </g>
    <g transform="translate(275 275)">
      <circle r="15" fill="#d99a2b"/>
      <rect x="-60" y="-122" width="120" height="78" rx="16" fill="#fff" stroke="#eadfce"/>
      <text y="-90" fill="#7c2d12" font-size="15" font-weight="850">June 28</text>
      <text y="-66" fill="#64748b" font-size="13">Military day</text>
    </g>
    <g transform="translate(445 275)">
      <circle r="21" fill="#b45309"/>
      <rect x="-80" y="44" width="160" height="94" rx="18" fill="#fff7ed" stroke="#d99a2b" stroke-width="2"/>
      <text y="77" fill="#7c2d12" font-size="16" font-weight="850">July 3</text>
      <text y="101" fill="#475569" font-size="13">Several hours with</text>
      <text y="120" fill="#475569" font-size="13">no scheduled flights</text>
    </g>
    <g transform="translate(615 275)">
      <circle r="26" fill="#7c2d12"/>
      <circle r="42" fill="#f59e0b" opacity=".18"/>
      <rect x="-86" y="-145" width="172" height="105" rx="20" fill="#fff1df" stroke="#b45309" stroke-width="2"/>
      <text y="-108" fill="#7c2d12" font-size="18" font-weight="900">July 4</text>
      <text y="-82" fill="#334155" font-size="13">No scheduled flights</text>
      <text y="-63" fill="#334155" font-size="13">after noon</text>
    </g>
    <g transform="translate(785 275)">
      <circle r="17" fill="#568b69"/>
      <rect x="-66" y="44" width="132" height="78" rx="16" fill="#f4fbf6" stroke="#9bc5a8"/>
      <text y="76" fill="#2f6f46" font-size="15" font-weight="850">July 5</text>
      <text y="100" fill="#64748b" font-size="13">Normal ops expected</text>
    </g>
    <g transform="translate(945 275)">
      <circle r="15" fill="#d99a2b"/>
      <rect x="-66" y="-122" width="132" height="78" rx="16" fill="#fff" stroke="#eadfce"/>
      <text y="-90" fill="#7c2d12" font-size="15" font-weight="850">July 10</text>
      <text y="-66" fill="#64748b" font-size="13">Flyover / jump</text>
    </g>
    <g transform="translate(1085 275)">
      <circle r="15" fill="#d99a2b"/>
      <rect x="-78" y="44" width="156" height="78" rx="16" fill="#fff" stroke="#eadfce"/>
      <text y="76" fill="#7c2d12" font-size="15" font-weight="850">Aug. 22-23</text>
      <text y="100" fill="#64748b" font-size="13">Grand Prix near Mall</text>
    </g>
  </g>
  <text x="70" y="468" fill="#6b7280" font-family="Inter, Arial, sans-serif" font-size="14">Source basis: MWAA and FlyReagan public advisories; visualization by Hexin Yu.</text>
</svg>
