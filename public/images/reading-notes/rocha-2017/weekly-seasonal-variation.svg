<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Weekly and seasonal variation in airport centrality</title>
  <desc id="desc">A schematic chart showing higher weekday connectivity and seasonal variation in average degree.</desc>
  <rect width="960" height="520" fill="#fffdf8"/>
  <rect x="34" y="34" width="892" height="452" rx="18" fill="#ffffff" stroke="#e7dfd2"/>
  <text x="70" y="86" fill="#1f2937" font-family="Arial, sans-serif" font-size="28" font-weight="700">Network structure changes by week and season</text>
  <text x="70" y="120" fill="#64748b" font-family="Arial, sans-serif" font-size="17">Centrality is not fixed; schedules follow passenger demand, business travel, leisure peaks, and seasonal operations.</text>

  <g transform="translate(86 178)">
    <text x="0" y="-28" fill="#1f2937" font-family="Arial, sans-serif" font-size="20" font-weight="700">Weekday vs weekend</text>
    <line x1="0" y1="190" x2="340" y2="190" stroke="#cbd5e1" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="190" stroke="#cbd5e1" stroke-width="2"/>
    <g font-family="Arial, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">
      <text x="28" y="218">Mon</text><text x="76" y="218">Tue</text><text x="124" y="218">Wed</text><text x="172" y="218">Thu</text><text x="220" y="218">Fri</text><text x="268" y="218">Sat</text><text x="316" y="218">Sun</text>
    </g>
    <path d="M28 88 L76 70 L124 68 L172 74 L220 82 L268 126 L316 138" fill="none" stroke="#2563eb" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#2563eb">
      <circle cx="28" cy="88" r="6"/><circle cx="76" cy="70" r="6"/><circle cx="124" cy="68" r="6"/><circle cx="172" cy="74" r="6"/><circle cx="220" cy="82" r="6"/><circle cx="268" cy="126" r="6"/><circle cx="316" cy="138" r="6"/>
    </g>
  </g>

  <g transform="translate(532 178)">
    <text x="0" y="-28" fill="#1f2937" font-family="Arial, sans-serif" font-size="20" font-weight="700">Seasonal route density</text>
    <line x1="0" y1="190" x2="340" y2="190" stroke="#cbd5e1" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="190" stroke="#cbd5e1" stroke-width="2"/>
    <g font-family="Arial, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">
      <text x="36" y="218">Winter</text><text x="124" y="218">Spring</text><text x="212" y="218">Summer</text><text x="300" y="218">Fall</text>
    </g>
    <path d="M36 140 C84 118 96 94 124 92 C162 88 172 42 212 46 C254 52 266 95 300 112" fill="none" stroke="#b45309" stroke-width="6" stroke-linecap="round"/>
    <g fill="#b45309">
      <circle cx="36" cy="140" r="6"/><circle cx="124" cy="92" r="6"/><circle cx="212" cy="46" r="6"/><circle cx="300" cy="112" r="6"/>
    </g>
  </g>
  <text x="70" y="452" fill="#64748b" font-family="Arial, sans-serif" font-size="18">A hub can be more or less important depending on the calendar window being measured.</text>
</svg>
