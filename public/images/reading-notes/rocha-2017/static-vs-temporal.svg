<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Static and temporal air transport network comparison</title>
  <desc id="desc">A schematic showing that a static route map can imply connectivity while a temporal schedule can change which airports are central.</desc>
  <rect width="960" height="520" fill="#fffdf8"/>
  <rect x="34" y="34" width="892" height="452" rx="18" fill="#ffffff" stroke="#e7dfd2"/>
  <text x="82" y="88" fill="#1f2937" font-family="Arial, sans-serif" font-size="28" font-weight="700">Static route map</text>
  <text x="556" y="88" fill="#1f2937" font-family="Arial, sans-serif" font-size="28" font-weight="700">Temporal paths</text>
  <line x1="480" y1="82" x2="480" y2="438" stroke="#e7dfd2" stroke-width="2"/>

  <g fill="none" stroke="#2563eb" stroke-width="6" stroke-linecap="round">
    <path d="M150 245 L280 165 L380 250 L280 340 Z"/>
    <path d="M150 245 L380 250"/>
    <path d="M280 165 L280 340"/>
  </g>
  <g font-family="Arial, sans-serif" font-weight="700" font-size="18" text-anchor="middle">
    <circle cx="150" cy="245" r="28" fill="#fef3c7" stroke="#b45309" stroke-width="4"/><text x="150" y="252" fill="#78350f">A</text>
    <circle cx="280" cy="165" r="28" fill="#eff6ff" stroke="#2563eb" stroke-width="4"/><text x="280" y="172" fill="#1d4ed8">P</text>
    <circle cx="380" cy="250" r="28" fill="#fef3c7" stroke="#b45309" stroke-width="4"/><text x="380" y="257" fill="#78350f">Q</text>
    <circle cx="280" cy="340" r="28" fill="#fef3c7" stroke="#b45309" stroke-width="4"/><text x="280" y="347" fill="#78350f">B</text>
  </g>
  <text x="82" y="425" fill="#64748b" font-family="Arial, sans-serif" font-size="18">Every edge looks available at once.</text>

  <g fill="none" stroke="#b45309" stroke-width="5" stroke-linecap="round" stroke-dasharray="10 10">
    <path d="M610 245 C665 150 735 145 785 205"/>
    <path d="M610 245 C665 360 750 365 820 295"/>
  </g>
  <g fill="none" stroke="#2563eb" stroke-width="7" stroke-linecap="round">
    <path d="M600 245 L720 170"/>
    <path d="M720 340 L840 250"/>
  </g>
  <g font-family="Arial, sans-serif" font-weight="700" font-size="18" text-anchor="middle">
    <circle cx="600" cy="245" r="28" fill="#fef3c7" stroke="#b45309" stroke-width="4"/><text x="600" y="252" fill="#78350f">A</text>
    <circle cx="720" cy="170" r="28" fill="#eff6ff" stroke="#2563eb" stroke-width="4"/><text x="720" y="177" fill="#1d4ed8">P</text>
    <circle cx="840" cy="250" r="28" fill="#fef3c7" stroke="#b45309" stroke-width="4"/><text x="840" y="257" fill="#78350f">Q</text>
    <circle cx="720" cy="340" r="28" fill="#fee2e2" stroke="#dc2626" stroke-width="4"/><text x="720" y="347" fill="#991b1b">B</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="16" fill="#334155">
    <text x="650" y="148">08:00</text>
    <text x="775" y="232">09:30</text>
    <text x="648" y="368">15:00</text>
    <text x="785" y="327">16:20</text>
  </g>
  <text x="556" y="425" fill="#64748b" font-family="Arial, sans-serif" font-size="18">Timing decides which paths are actually usable.</text>
</svg>
