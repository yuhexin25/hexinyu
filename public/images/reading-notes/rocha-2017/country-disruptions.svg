<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Country-level airspace disruptions</title>
  <desc id="desc">A schematic showing how country-level airspace closure can force rerouting across global aviation networks.</desc>
  <rect width="960" height="520" fill="#fffdf8"/>
  <rect x="34" y="34" width="892" height="452" rx="18" fill="#ffffff" stroke="#e7dfd2"/>
  <text x="70" y="86" fill="#1f2937" font-family="Arial, sans-serif" font-size="28" font-weight="700">Country-level disruption can reshape global paths</text>
  <text x="70" y="120" fill="#64748b" font-family="Arial, sans-serif" font-size="17">Volcanic ash, conflicts, airspace closures, strikes, and attacks can remove key corridors from the network.</text>

  <g fill="none" stroke-linecap="round">
    <path d="M150 335 C300 110 600 110 800 325" stroke="#2563eb" stroke-width="6"/>
    <path d="M150 335 C320 420 620 430 800 325" stroke="#b45309" stroke-width="6" stroke-dasharray="14 12"/>
    <path d="M160 280 C300 230 430 230 520 270" stroke="#cbd5e1" stroke-width="4"/>
    <path d="M530 270 C620 230 720 245 790 285" stroke="#cbd5e1" stroke-width="4"/>
  </g>
  <g>
    <rect x="410" y="176" width="164" height="150" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="4"/>
    <text x="492" y="234" fill="#991b1b" font-family="Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">Closed</text>
    <text x="492" y="264" fill="#991b1b" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">airspace</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="17" font-weight="700" text-anchor="middle">
    <circle cx="150" cy="335" r="30" fill="#fef3c7" stroke="#b45309" stroke-width="4"/><text x="150" y="342" fill="#78350f">O</text>
    <circle cx="800" cy="325" r="30" fill="#fef3c7" stroke="#b45309" stroke-width="4"/><text x="800" y="332" fill="#78350f">D</text>
    <circle cx="300" cy="170" r="23" fill="#eff6ff" stroke="#2563eb" stroke-width="4"/><text x="300" y="177" fill="#1d4ed8">H1</text>
    <circle cx="650" cy="178" r="23" fill="#eff6ff" stroke="#2563eb" stroke-width="4"/><text x="650" y="185" fill="#1d4ed8">H2</text>
    <circle cx="470" cy="405" r="23" fill="#fef3c7" stroke="#b45309" stroke-width="4"/><text x="470" y="412" fill="#78350f">R</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="16" fill="#334155">
    <text x="260" y="134">normal corridor</text>
    <text x="515" y="430">rerouted path: longer, costlier, more delay exposure</text>
  </g>
  <text x="70" y="452" fill="#64748b" font-family="Arial, sans-serif" font-size="18">A disruption in one country can change route choices, hub loads, and ticket prices far outside that country.</text>
</svg>
