<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">DCA planned airspace closure network graphic</title>
  <desc id="desc">Abstract runway and airspace network lines around Washington D.C. for a blog post about DCA July 4 operations.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="0.5" stop-color="#fff4df"/>
      <stop offset="1" stop-color="#e9f2ff"/>
    </linearGradient>
    <linearGradient id="runway" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#31405d"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#3f2f1f" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.16" fill="none" stroke="#b45309" stroke-width="2">
    <path d="M110 700 C 360 470, 545 505, 780 332 S 1180 205, 1500 360"/>
    <path d="M55 315 C 330 220, 520 270, 795 175 S 1190 120, 1560 245"/>
    <path d="M240 820 C 480 610, 660 650, 920 490 S 1210 405, 1535 555"/>
  </g>
  <g opacity="0.28" fill="none" stroke="#527ca8" stroke-width="1.5" stroke-dasharray="8 10">
    <path d="M230 160 C 470 270, 560 200, 820 430 S 1250 655, 1490 505"/>
    <path d="M120 560 C 375 380, 560 450, 760 280 S 1120 110, 1450 170"/>
  </g>
  <g transform="translate(355 230)" filter="url(#softShadow)">
    <rect x="0" y="250" width="900" height="120" rx="22" fill="url(#runway)" transform="rotate(-16 450 310)"/>
    <g transform="rotate(-16 450 310)" fill="#fffdf8" opacity="0.88">
      <rect x="75" y="305" width="90" height="10" rx="5"/>
      <rect x="215" y="305" width="90" height="10" rx="5"/>
      <rect x="355" y="305" width="90" height="10" rx="5"/>
      <rect x="495" y="305" width="90" height="10" rx="5"/>
      <rect x="635" y="305" width="90" height="10" rx="5"/>
      <rect x="775" y="305" width="70" height="10" rx="5"/>
    </g>
  </g>
  <g transform="translate(738 410)">
    <circle r="112" fill="#fff" opacity="0.82"/>
    <circle r="86" fill="none" stroke="#d9c8b5" stroke-width="2"/>
    <circle r="48" fill="#b45309" opacity="0.12"/>
    <text x="0" y="-4" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="800" fill="#1e293b">DCA</text>
    <text x="0" y="32" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="3" fill="#b45309">GROUND STOP</text>
  </g>
  <g font-family="Inter, Arial, sans-serif" font-weight="700" fill="#1e293b">
    <g transform="translate(210 570)">
      <circle r="8" fill="#527ca8"/>
      <text x="20" y="6" font-size="28">IAD</text>
    </g>
    <g transform="translate(1280 645)">
      <circle r="8" fill="#527ca8"/>
      <text x="20" y="6" font-size="28">BWI</text>
    </g>
    <g transform="translate(1170 235)">
      <circle r="8" fill="#d99a2b"/>
      <text x="20" y="6" font-size="28">National Mall Airspace</text>
    </g>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <text x="110" y="110" font-size="24" fill="#b45309" font-weight="800" letter-spacing="4">AIRPORT OPERATIONS / NETWORK RESILIENCE</text>
    <text x="110" y="160" font-size="58" fill="#1e293b" font-weight="800">Planned Closure, Real Network Impact</text>
    <text x="110" y="210" font-size="26" fill="#526071">July 4, 2026 · Washington, D.C.</text>
  </g>
</svg>
